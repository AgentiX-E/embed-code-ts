name: Nightly Model Check

on:
  schedule:
    - cron: '0 2 * * *' # Daily at 2 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  actions: write
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Install dependencies
        run: pip install huggingface-hub

      - name: Check for new HuggingFace revision
        id: check
        run: |
          LATEST_REV=$(python3 -c "
          try:
              from huggingface_hub import HfApi
              api = HfApi()
              info = api.model_info('nomic-ai/nomic-embed-text-v1.5')
              print(info.sha[:12])
          except Exception as e:
              print('error:' + str(e))
          " 2>/dev/null || echo "unknown")

          COMMITTED_REV=$(python3 -c "
          import json, os
          path = 'models/model-descriptor.json'
          if os.path.exists(path):
              with open(path) as f:
                  d = json.load(f)
              rev = d.get('model',{}).get('hf_revision','')
              print(rev[:12] if rev else 'unknown')
          else:
              print('unknown')
          " 2>/dev/null || echo "unknown")

          echo "latest_rev=$LATEST_REV" >> $GITHUB_OUTPUT
          echo "committed_rev=$COMMITTED_REV" >> $GITHUB_OUTPUT

          if [ "$LATEST_REV" != "unknown" ] && [ "$LATEST_REV" != "$COMMITTED_REV" ] && [ -n "$LATEST_REV" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "New HF revision: $LATEST_REV (committed: $COMMITTED_REV)"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No change: $LATEST_REV (committed: $COMMITTED_REV)"
          fi

      - name: Create issue for model update
        if: steps.check.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'model-update',
              state: 'open',
            });

            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '[Model Update] New nomic-embed-text-v1.5 revision detected',
                body: 'A new HuggingFace revision was detected. The model-release workflow has been triggered.',
                labels: ['model-update'],
              });
            }
