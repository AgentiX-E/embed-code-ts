name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm run build
      - run: npx vitest run --config vitest.unit.config.ts --coverage
      - name: Check coverage
        run: node scripts/ci-coverage-check.js --tier unit --verbose
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with: { name: coverage-report, path: coverage/, retention-days: 7 }

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm run build
      - run: npm_config_yes=true npx -w @agentix-e/embed-code-node tsc 2>/dev/null || true
      - run: npm_config_yes=true npx -w @agentix-e/embed-code-web tsc 2>/dev/null || true

  integration-test:
    needs: [lint, build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: 'npm' }
      - uses: actions/setup-python@v6
        with: { python-version: '3.11' }
      - run: npm ci
      - run: npm run build
      - name: Export ONNX model
        run: |
          pip install transformers torch onnx onnxruntime optimum
          python3 scripts/export-model.py --model nomic-ai/nomic-embed-text-v1.5 --output models/nomic-embed-code-v1.5.int8.onnx || echo "Model export skipped"
        continue-on-error: true
      - name: Run tests with ONNX model
        run: npx vitest run --coverage
        env:
          EMBED_CODE_MODEL_PATH: models/nomic-embed-code-v1.5.int8.onnx
        continue-on-error: true
      - name: Upload integration coverage
        uses: actions/upload-artifact@v7
        with: { name: integration-coverage, path: coverage/, retention-days: 7 }

  deploy-pages:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: [lint, unit-test, build, integration-test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm run build
      - name: Generate API docs
        run: npx typedoc
      - name: Download coverage
        uses: actions/download-artifact@v4
        with: { name: coverage-report, path: docs/coverage }
        continue-on-error: true
      - name: Download integration coverage
        uses: actions/download-artifact@v4
        with: { name: integration-coverage, path: docs/coverage-integration }
        continue-on-error: true
      - name: Prepare pages
        run: node scripts/prepare-pages.js
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v5
        with: { path: docs }
      - uses: actions/deploy-pages@v4
        id: deployment
