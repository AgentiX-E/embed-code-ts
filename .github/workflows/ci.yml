name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ─── Lint ─────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  # ─── Unit Tests + Coverage ────────────────────────────────
  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm run build
      - run: npx vitest run --config vitest.unit.config.ts --coverage
      - name: Check coverage thresholds
        run: node scripts/ci-coverage-check.js --tier unit --verbose
      - name: Ensure coverage directory exists
        if: always()
        run: |
          mkdir -p coverage
          if [ ! -f coverage/coverage-summary.json ]; then
            echo '{"total":{"lines":{"pct":0},"branches":{"pct":0},"functions":{"pct":0},"statements":{"pct":0}}}' > coverage/coverage-summary.json
          fi
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─── Build ────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm run build:all

  # ─── Integration Test ─────────────────────────────────────
  #
  # Downloads a real ONNX model for integration testing.
  # Priority: GitHub Release (nomic-embed-code 7B int8) →
  #           HuggingFace (nomic-embed-text-v1.5 137M int8 as fallback).
  #
  # The committed models/model-descriptor.json is NEVER overwritten.
  # CI writes its own descriptor to models/ci/ for test isolation.
  integration-test:
    needs: [lint, build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: 'npm' }
      - uses: actions/setup-python@v6
        with: { python-version: '3.11' }

      - run: npm ci
      - run: npm run build:all

      - name: Cache ONNX model
        id: cache-model
        uses: actions/cache@v6
        with:
          path: models/nomic-embed-code-v1-int8.onnx
          key: embed-code-model-${{ hashFiles('scripts/export-onnx.py', 'models/model-descriptor.json') }}-v1

      - name: Download ONNX model from GitHub Release
        if: steps.cache-model.outputs.cache-hit != 'true'
        id: download-release
        run: |
          mkdir -p models
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/embed-code-latest-int8/nomic-embed-code-v1-int8.zip"
          echo "Attempting GitHub Release download: $RELEASE_URL"
          if curl -sfL -o models/nomic-embed-code-v1-int8.zip "$RELEASE_URL"; then
            unzip -o models/nomic-embed-code-v1-int8.zip -d models/
            echo "source=github-release" >> $GITHUB_OUTPUT
            echo "Downloaded nomic-embed-code 7B int8 from GitHub Release"
          else
            echo "source=none" >> $GITHUB_OUTPUT
            echo "GitHub Release not available (first run — model not yet released)"
          fi
        timeout-minutes: 15

      - name: Fallback — download nomic-embed-text-v1.5 int8 from HuggingFace
        if: steps.cache-model.outputs.cache-hit != 'true' && steps.download-release.outputs.source == 'none'
        run: |
          pip install huggingface_hub
          python3 -c "
          from huggingface_hub import hf_hub_download
          import shutil, os
          os.makedirs('models', exist_ok=True)
          path = hf_hub_download('nomic-ai/nomic-embed-text-v1.5', 'onnx/model_int8.onnx')
          shutil.copy(path, 'models/nomic-embed-text-v1.5-int8.onnx')
          print(f'Downloaded: {os.path.getsize(\"models/nomic-embed-text-v1.5-int8.onnx\") / 1024**2:.0f} MB')
          "
          # Download tokenizer files
          for repo in nomic-ai/nomic-embed-text-v1.5 nomic-ai/nomic-embed-code; do
            python3 -c "
          from huggingface_hub import hf_hub_download
          import shutil
          for f in ['tokenizer.json', 'tokenizer_config.json']:
              try:
                  path = hf_hub_download('$repo', f)
                  shutil.copy(path, f'models/{f}')
              except: pass
          " || true
          done
        timeout-minutes: 10

      - name: Determine model path for tests
        id: model-path
        run: |
          if [ -f models/nomic-embed-code-v1-int8.onnx ]; then
            echo "path=models/nomic-embed-code-v1-int8.onnx" >> $GITHUB_OUTPUT
            echo "model=nomic-embed-code (7B int8)" >> $GITHUB_STEP_SUMMARY
          elif [ -f models/nomic-embed-text-v1.5-int8.onnx ]; then
            echo "path=models/nomic-embed-text-v1.5-int8.onnx" >> $GITHUB_OUTPUT
            echo "model=nomic-embed-text-v1.5 (137M int8 — fallback)" >> $GITHUB_STEP_SUMMARY
          else
            echo "path=" >> $GITHUB_OUTPUT
            echo "model=none — integration tests will be skipped" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Run integration tests with coverage
        if: steps.model-path.outputs.path != ''
        run: npx vitest run --coverage
        env:
          EMBED_CODE_MODEL_PATH: ${{ steps.model-path.outputs.path }}

      - name: Check coverage thresholds
        if: steps.model-path.outputs.path != ''
        run: node scripts/ci-coverage-check.js --tier integration --verbose

      - name: Ensure coverage directory exists
        if: always()
        run: |
          mkdir -p coverage
          if [ ! -f coverage/coverage-summary.json ]; then
            echo '{"total":{"lines":{"pct":0},"branches":{"pct":0},"functions":{"pct":0},"statements":{"pct":0}}}' > coverage/coverage-summary.json
          fi

      - name: Upload integration coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-coverage
          path: coverage/
          retention-days: 7

  # ─── Benchmark ────────────────────────────────────────────
  benchmark:
    needs: [integration-test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm run build:all

      - name: Restore cached ONNX model
        id: cache-model
        uses: actions/cache/restore@v6
        with:
          path: models/nomic-embed-code-v1-int8.onnx
          key: embed-code-model-${{ hashFiles('scripts/export-onnx.py', 'models/model-descriptor.json') }}-v1
          fail-on-cache-miss: true

      - name: Run benchmark
        run: |
          node scripts/benchmark-ci.js \
            --json benchmark-report.json \
            --md benchmark-report.md \
            --html benchmark-report.html \
            --baseline benchmarks/baseline.json \
            --verbose
        env:
          EMBED_CODE_MODEL_PATH: models/nomic-embed-code-v1-int8.onnx
          BENCH_ITERATIONS: 10
        timeout-minutes: 10

      - name: Accuracy Gate
        run: node scripts/ci-benchmark-check.js --verbose

      - name: Post benchmark summary
        if: always()
        run: |
          if [ -f benchmark-report.md ]; then
            cat benchmark-report.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-report
          path: |
            benchmark-report.json
            benchmark-report.md
            benchmark-report.html
          retention-days: 7

  # ─── Deploy Pages ─────────────────────────────────────────
  deploy-pages:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: [lint, unit-test, build, integration-test, benchmark]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm run build:all

      - name: Generate API docs
        run: npx typedoc

      - name: Download coverage
        uses: actions/download-artifact@v4
        with: { name: coverage-report, path: docs/coverage }
        continue-on-error: true

      - name: Download integration coverage
        uses: actions/download-artifact@v4
        with: { name: integration-coverage, path: docs/coverage-integration }
        continue-on-error: true

      - name: Download benchmark
        uses: actions/download-artifact@v4
        with: { name: benchmark-report, path: docs/benchmark }
        continue-on-error: true

      - name: Prepare pages
        run: node scripts/prepare-pages.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with: { path: docs }

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
