name: CI

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm run build
      - run: npm run test:unit:coverage

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm run build

  integration-test:
    needs: [lint, build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: 'npm' }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: npm ci
      - run: npm run build

      - name: Cache ONNX model
        id: cache-model
        uses: actions/cache@v6
        with:
          path: models/nomic-embed-code-v1.5.int8.onnx
          key: embed-code-model-${{ hashFiles('scripts/export-model.py', 'models/model-descriptor.json') }}-v7

      - name: Export ONNX model
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          pip install transformers torch onnx onnxscript onnxruntime einops optimum
          python3 scripts/export-model.py --model nomic-ai/nomic-embed-text-v1.5 --output models/nomic-embed-code-v1.5.int8.onnx
        timeout-minutes: 15

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Coverage threshold check
        run: node scripts/ci-coverage-check.js --tier integration --verbose

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with: { name: coverage-report, path: coverage/, retention-days: 7 }

  benchmark:
    needs: [integration-test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm run build

      - name: Restore cached ONNX model
        uses: actions/cache/restore@v6
        with:
          path: models/nomic-embed-code-v1.5.int8.onnx
          key: embed-code-model-${{ hashFiles('scripts/export-model.py', 'models/model-descriptor.json') }}-v7
          fail-on-cache-miss: true

      - name: Run benchmark (Node.js native)
        run: npx tsx scripts/benchmark-ci.js --verbose --json benchmark-report.json --md benchmark-report.md --html benchmark-report.html
        timeout-minutes: 10
        env:
          EMBED_CODE_MODEL_PATH: models/nomic-embed-code-v1.5.int8.onnx
          BENCH_ITERATIONS: 5

      - name: Accuracy Gate
        run: node scripts/ci-benchmark-check.js --verbose

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-report
          path: |
            benchmark-report.json
            benchmark-report.md
            benchmark-report.html
          retention-days: 7

  web-benchmark:
    needs: [integration-test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm run build

      - name: Restore cached ONNX model
        uses: actions/cache/restore@v6
        with:
          path: models/nomic-embed-code-v1.5.int8.onnx
          key: embed-code-model-${{ hashFiles('scripts/export-model.py', 'models/model-descriptor.json') }}-v7
          fail-on-cache-miss: true

      - name: Run web benchmark (WASM)
        run: npx tsx scripts/web-benchmark-ci.js --verbose --json web-benchmark-report.json --md web-benchmark-report.md --html web-benchmark-report.html
        timeout-minutes: 10
        env:
          EMBED_CODE_MODEL_PATH: models/nomic-embed-code-v1.5.int8.onnx
          BENCH_ITERATIONS: 5

      - name: Upload web benchmark artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-benchmark-report
          path: |
            web-benchmark-report.json
            web-benchmark-report.md
            web-benchmark-report.html
          retention-days: 7

  deploy-pages:
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || github.event_name == 'schedule')
    needs: [lint, unit-test, build, integration-test, benchmark, web-benchmark]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm run build:all

      - name: Generate API documentation
        run: npx typedoc

      - name: Download benchmark report
        uses: actions/download-artifact@v4
        with: { name: benchmark-report, path: docs/benchmark }

      - name: Download web benchmark report
        uses: actions/download-artifact@v4
        with: { name: web-benchmark-report, path: docs/web-benchmark }

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with: { name: coverage-report, path: docs/coverage }

      - name: Generate combined benchmark report
        run: |
          if [ -f docs/benchmark/benchmark-report.json ] && [ -f docs/web-benchmark/web-benchmark-report.json ]; then
            node scripts/generate-combined-report.js \
              --node docs/benchmark/benchmark-report.json \
              --web docs/web-benchmark/web-benchmark-report.json \
              --out docs/benchmark/index.html
            echo "[deploy-pages] Combined benchmark report generated"
          else
            echo "[deploy-pages] Skipping combined benchmark (missing benchmark data)"
          fi

      - name: Prepare pages
        run: node scripts/prepare-pages.js

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with: { path: docs }
      - uses: actions/deploy-pages@v4
        id: deployment
