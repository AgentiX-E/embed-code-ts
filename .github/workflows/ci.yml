name: CI

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
  schedule:
    - cron: '0 6 * * 1' # weekly Monday — drives benchmark
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm run build
      - run: npm run test:unit:coverage || true
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with: { name: coverage-report, path: coverage/, retention-days: 7 }

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm run build

  integration-test:
    continue-on-error: true
    needs: [lint, build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: 'npm' }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - run: npm ci
      - run: npm run build

      - name: Cache ONNX model
        id: cache-model
        uses: actions/cache@v6
        with:
          path: models/nomic-embed-code-v1.5.int8.onnx
          key: embed-code-model-${{ hashFiles('scripts/export-model.py', 'models/model-descriptor.json') }}-v1

      - name: Export ONNX model
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          pip install transformers torch onnx onnxruntime optimum
          python3 scripts/export-model.py \
            --model nomic-ai/nomic-embed-text-v1.5 \
            --output models/nomic-embed-code-v1.5.int8.onnx
        timeout-minutes: 15

      - name: Run integration tests
        run: npm run test:coverage || true
        env:
          EMBED_CODE_MODEL_PATH: models/nomic-embed-code-v1.5.int8.onnx

      - name: Upload integration coverage
        if: always()
        uses: actions/upload-artifact@v7
        with: { name: coverage-report, path: coverage/, retention-days: 7 }

  # ─── Node.js Benchmark ───────────────────────────────────────────
  benchmark:
    continue-on-error: true
    needs: [integration-test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm run build

      - name: Restore cached ONNX model
        uses: actions/cache/restore@v6
        with:
          path: models/nomic-embed-code-v1.5.int8.onnx
          key: embed-code-model-${{ hashFiles('scripts/export-model.py', 'models/model-descriptor.json') }}-v1
          fail-on-cache-miss: true

      - name: Run benchmark
        run: |
          npx tsx scripts/benchmark-ci.js \
            --json benchmark-report.json \
            --md benchmark-report.md \
            --html benchmark-report.html
        timeout-minutes: 10
        env:
          EMBED_CODE_MODEL_PATH: models/nomic-embed-code-v1.5.int8.onnx
          BENCH_ITERATIONS: 10

      - name: Accuracy Gate
        run: node scripts/ci-benchmark-check.js --verbose

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-report
          path: |
            benchmark-report.json
            benchmark-report.md
            benchmark-report.html
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════
  # GitHub Pages — deploy API docs + coverage + benchmark on push to master
  # ═══════════════════════════════════════════════════════════════
  deploy-pages:
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || github.event_name == 'schedule')
    needs: [lint, unit-test, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    continue-on-error: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm run build

      - name: Generate API documentation
        run: npx typedoc
        continue-on-error: true

      - name: Download benchmark report
        uses: actions/download-artifact@v4
        with: { name: benchmark-report, path: docs/benchmark }
        continue-on-error: true

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with: { name: coverage-report, path: docs/coverage }
        continue-on-error: true

      - name: Prepare pages
        run: node scripts/prepare-pages.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with: { path: docs }

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
