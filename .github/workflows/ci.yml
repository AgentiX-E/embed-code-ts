name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ─── Lint ─────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  # ─── Unit Tests + Coverage ────────────────────────────────
  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm run build
      - run: npx vitest run --config vitest.unit.config.ts --coverage
      - name: Check coverage thresholds
        run: node scripts/ci-coverage-check.js --tier unit --verbose
      - name: Ensure coverage directory exists
        run: |
          mkdir -p coverage
          if [ ! -f coverage/coverage-summary.json ]; then
            echo '{"total":{"lines":{"pct":0},"branches":{"pct":0},"functions":{"pct":0},"statements":{"pct":0}}}' > coverage/coverage-summary.json
          fi
        continue-on-error: true
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─── Build ────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm run build:all

  # ─── Integration Test ─────────────────────────────────────
  integration-test:
    needs: [lint, build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: 'npm' }
      - uses: actions/setup-python@v6
        with: { python-version: '3.11' }

      - run: npm ci
      - run: npm run build:all

      - name: Cache ONNX model
        id: cache-model
        uses: actions/cache@v6
        with:
          path: models/nomic-embed-text-v1.5-int8.onnx
          key: embed-code-model-${{ hashFiles('models/model-descriptor.json') }}-v3

      - name: Download pre-converted ONNX model
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          pip install huggingface_hub
          python3 -c "
          from huggingface_hub import hf_hub_download
          path = hf_hub_download('nomic-ai/nomic-embed-text-v1.5', 'onnx/model_int8.onnx')
          import shutil, os
          os.makedirs('models', exist_ok=True)
          shutil.copy(path, 'models/nomic-embed-text-v1.5-int8.onnx')
          print(f'Downloaded: {os.path.getsize(\"models/nomic-embed-text-v1.5-int8.onnx\") / 1024**2:.0f} MB')
          "
          # Also download tokenizer files
          python3 -c "
          from huggingface_hub import hf_hub_download
          import shutil
          for f in ['tokenizer.json', 'tokenizer_config.json', 'vocab.json', 'merges.txt', 'special_tokens_map.json']:
              try:
                  path = hf_hub_download('nomic-ai/nomic-embed-text-v1.5', f)
                  shutil.copy(path, f'models/{f}')
              except: pass
          " || true
          python3 -c "
          from huggingface_hub import hf_hub_download
          import shutil
          for f in ['tokenizer.json', 'tokenizer_config.json']:
              try:
                  path = hf_hub_download('nomic-ai/nomic-embed-code', f)
                  shutil.copy(path, f'models/{f}')
              except: pass
          " || true
          # Write correct model-descriptor.json for embed-text-v1.5
          python3 -c "
          import json
          descriptor = {
            'schema': 1,
            'model': { 'name': 'nomic-embed-text', 'version': 'v1.5', 'base_architecture': 'BERT', 'hf_repository': 'nomic-ai/nomic-embed-text-v1.5', 'hf_revision': '', 'exported_at': '', 'precision': 'int8' },
            'onnx': { 'input_ids_name': 'input_ids', 'attention_mask_name': 'attention_mask', 'token_type_ids_name': 'token_type_ids', 'output_name': 'last_hidden_state', 'opset': 18, 'sha256': '', 'size_bytes': 0 },
            'architecture': { 'embedding_dim': 768, 'num_layers': 12, 'num_heads': 12, 'num_kv_heads': 0, 'head_dim': 64, 'hidden_size': 768, 'intermediate_size': 3072, 'vocab_size': 30522, 'max_position_embeddings': 8192, 'rope_theta': 0, 'sliding_window': None, 'attention_dropout': 0.0, 'use_sliding_window': False },
            'tokenizer': { 'type': 'bpe', 'vocab_size': 30522, 'max_length': 8192, 'pad_token': '[PAD]', 'pad_token_id': 0, 'bos_token': '[CLS]', 'bos_token_id': 101, 'eos_token': '[SEP]', 'eos_token_id': 102, 'unk_token': '[UNK]', 'unk_token_id': 100 },
            'pooling': { 'strategy': 'mean', 'normalize': True },
            'task_prefixes': { 'query': 'search_query: ', 'document': 'search_document: ' }
          }
          with open('models/model-descriptor.json', 'w') as f:
            json.dump(descriptor, f, indent=2)
          " || true
        timeout-minutes: 5

      - name: Run integration tests with coverage
        run: npx vitest run --coverage
        env:
          EMBED_CODE_MODEL_PATH: models/nomic-embed-text-v1.5-int8.onnx

      - name: Check coverage thresholds
        run: node scripts/ci-coverage-check.js --tier integration --verbose

      - name: Upload integration coverage
        uses: actions/upload-artifact@v7
        with:
          name: integration-coverage
          path: coverage/
          retention-days: 7

  # ─── Benchmark ────────────────────────────────────────────
  benchmark:
    needs: [integration-test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm run build:all

      - name: Restore cached ONNX model
        uses: actions/cache/restore@v6
        with:
          path: models/nomic-embed-text-v1.5-int8.onnx
          key: embed-code-model-${{ hashFiles('models/model-descriptor.json') }}-v3
          fail-on-cache-miss: true

      - name: Run benchmark
        run: |
          node scripts/benchmark-ci.js \
            --json benchmark-report.json \
            --md benchmark-report.md \
            --html benchmark-report.html \
            --baseline benchmarks/baseline.json \
            --verbose
        env:
          EMBED_CODE_MODEL_PATH: models/nomic-embed-text-v1.5-int8.onnx
          BENCH_ITERATIONS: 10
        timeout-minutes: 10

      - name: Accuracy Gate
        run: node scripts/ci-benchmark-check.js --verbose

      - name: Post benchmark summary
        if: always()
        run: |
          if [ -f benchmark-report.md ]; then
            cat benchmark-report.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload benchmark report
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-report
          path: |
            benchmark-report.json
            benchmark-report.md
            benchmark-report.html
          retention-days: 7

  # ─── Deploy Pages ─────────────────────────────────────────
  deploy-pages:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: [lint, unit-test, build, integration-test, benchmark]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm run build:all

      - name: Generate API docs
        run: npx typedoc

      - name: Download coverage
        uses: actions/download-artifact@v4
        with: { name: coverage-report, path: docs/coverage }
        continue-on-error: true

      - name: Download integration coverage
        uses: actions/download-artifact@v4
        with: { name: integration-coverage, path: docs/coverage-integration }
        continue-on-error: true

      - name: Download benchmark
        uses: actions/download-artifact@v4
        with: { name: benchmark-report, path: docs/benchmark }
        continue-on-error: true

      - name: Prepare pages
        run: node scripts/prepare-pages.js

      - name: Check if Pages is enabled
        id: pages-check
        run: |
          if curl -sf -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/pages" > /dev/null 2>&1; then
            echo "enabled=true" >> $GITHUB_OUTPUT
          else
            echo "::warning::GitHub Pages is not enabled for this repository. Skipping deployment."
            echo "enabled=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/configure-pages@v4
        if: steps.pages-check.outputs.enabled == 'true'

      - uses: actions/upload-pages-artifact@v3
        if: steps.pages-check.outputs.enabled == 'true'
        with: { path: docs }

      - uses: actions/deploy-pages@v4
        if: steps.pages-check.outputs.enabled == 'true'
        id: deployment
