name: Model Release

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Force re-export even if HF revision is unchanged'
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

jobs:
  # ─── Check HuggingFace for new revision ──────────────────
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      hf_sha: ${{ steps.check.outputs.hf_sha }}
      model_tag: ${{ steps.check.outputs.model_tag }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v7

      - name: Check HF revision
        id: check
        run: |
          HF_INFO=$(curl -sf https://huggingface.co/api/models/nomic-ai/nomic-embed-code || echo '{"sha":"unknown"}')
          HF_SHA=$(echo "$HF_INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sha','unknown')[:12])" 2>/dev/null || echo "unknown")

          COMMITTED_SHA=$(python3 -c "
          import json
          with open('models/model-descriptor.json') as f:
              d = json.load(f)
          print(d.get('model',{}).get('hf_revision','unknown')[:12])
          " 2>/dev/null || echo "unknown")

          echo "hf_sha=$HF_SHA" >> $GITHUB_OUTPUT
          echo "committed_sha=$COMMITTED_SHA" >> $GITHUB_OUTPUT

          # Tag: use short SHA prefix for uniqueness
          SHORT_SHA=$(echo "$HF_SHA" | cut -c1-7)
          echo "model_tag=model-${SHORT_SHA}" >> $GITHUB_OUTPUT

          if [ "$HF_SHA" != "unknown" ] && [ "$HF_SHA" != "$COMMITTED_SHA" ]; then
            echo "New HF revision detected: $HF_SHA (committed: $COMMITTED_SHA)"
            echo "should_release=true" >> $GITHUB_OUTPUT
          elif [ "${{ inputs.force }}" = "true" ]; then
            echo "Force release requested"
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "No new revision. $HF_SHA matches committed $COMMITTED_SHA."
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

  # ─── Export ONNX model from HuggingFace ───────────────────
  #
  # Exports nomic-embed-code (7B Qwen2.5-based) to int8 ONNX.
  # This step requires ~30 GB RAM for the 7B model.
  # Use a larger runner or self-hosted runner with sufficient memory.
  export:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: '3.11' }

      - name: Install dependencies
        run: pip install optimum onnx onnxruntime torch transformers

      - name: Export int8 ONNX model
        run: |
          python3 scripts/export-onnx.py \
            --model nomic-ai/nomic-embed-code \
            --output models/nomic-embed-code-v1-int8.onnx \
            --precision int8 \
            --skip-validation
        timeout-minutes: 40

      - name: Compute SHA-256
        run: |
          sha256sum models/nomic-embed-code-v1-int8.onnx | cut -d' ' -f1 > models/sha256.txt
          echo "SHA256: $(cat models/sha256.txt)"
          echo "Size: $(stat -c%s models/nomic-embed-code-v1-int8.onnx) bytes ($(du -h models/nomic-embed-code-v1-int8.onnx | cut -f1))"

      - name: Zip model and descriptor for release
        run: |
          zip -j models/nomic-embed-code-v1-int8.zip \
            models/nomic-embed-code-v1-int8.onnx \
            models/model-descriptor.json

      - name: Upload model zip
        uses: actions/upload-artifact@v7
        with:
          name: model-zip
          path: models/nomic-embed-code-v1-int8.zip
          retention-days: 1

  # ─── Validate exported model ──────────────────────────────
  validate:
    needs: export
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: 'npm' }

      - name: Download model zip
        uses: actions/download-artifact@v8
        with:
          name: model-zip
          path: models/

      - name: Extract model
        run: unzip -o models/nomic-embed-code-v1-int8.zip -d models/

      - run: npm ci
      - run: npm run build:all

      - name: Run tests with real model
        run: npx vitest run
        env:
          EMBED_CODE_MODEL_PATH: models/nomic-embed-code-v1-int8.onnx

  # ─── Create GitHub Release ────────────────────────────────
  release:
    needs: [check, validate]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Download model zip
        uses: actions/download-artifact@v8
        with:
          name: model-zip
          path: models/

      - name: Create release tag and upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODEL_TAG: ${{ needs.check.outputs.model_tag }}
        run: |
          # Create unique permanent tag for this model revision
          git tag "$MODEL_TAG" -f
          git push origin "$MODEL_TAG" -f

          # Upload to rolling release channel (embed-code-latest-int8)
          gh release create "embed-code-latest-int8" \
            models/nomic-embed-code-v1-int8.zip \
            --title "nomic-embed-code v1 int8 ONNX" \
            --notes "Auto-exported nomic-embed-code v1 int8 ONNX model from HuggingFace revision \`${{ needs.check.outputs.hf_sha }}\`.

          **Model**: nomic-embed-code (Qwen2.5-7B)
          **Precision**: int8 quantized
          **Embedding dim**: 3584
          **Max tokens**: 32768
          **Pooling**: last_token
          **HF repo**: [nomic-ai/nomic-embed-code](https://huggingface.co/nomic-ai/nomic-embed-code)" \
            --latest=false || true

          gh release upload "embed-code-latest-int8" \
            models/nomic-embed-code-v1-int8.zip --clobber || true

  # ─── Update model descriptor ──────────────────────────────
  commit-descriptor:
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - name: Download model zip
        uses: actions/download-artifact@v8
        with:
          name: model-zip
          path: models/

      - name: Extract and update descriptor
        env:
          HF_SHA: ${{ needs.check.outputs.hf_sha }}
        run: |
          unzip -o models/nomic-embed-code-v1-int8.zip -d models/
          SHA256=$(sha256sum models/nomic-embed-code-v1-int8.onnx | cut -d' ' -f1)
          SIZE=$(stat -c%s models/nomic-embed-code-v1-int8.onnx)

          python3 -c "
          import json, datetime
          with open('models/model-descriptor.json') as f:
              d = json.load(f)
          d['model']['hf_revision'] = '$HF_SHA'
          d['model']['exported_at'] = datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
          d['onnx']['sha256'] = '$SHA256'
          d['onnx']['size_bytes'] = $SIZE
          with open('models/model-descriptor.json', 'w') as f:
              json.dump(d, f, indent=2)
              f.write('\n')
          "

      - name: Commit and push descriptor update
        env:
          HF_SHA: ${{ needs.check.outputs.hf_sha }}
        run: |
          git config user.name "Lambertyan"
          git config user.email "Lambertyan@users.noreply.github.com"
          SHORT_SHA=$(echo "$HF_SHA" | cut -c1-12)
          BRANCH="auto/model-descriptor-update-${SHORT_SHA}"
          git checkout -b "$BRANCH"
          git add models/model-descriptor.json
          git commit -m "chore(model): update descriptor to HF rev ${SHORT_SHA}"
          git push origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(model): update model descriptor to HF rev ${SHORT_SHA}" \
            --body "Automated model descriptor update after exporting ONNX model from HF revision \`${HF_SHA}\`.

          - SHA-256 updated
          - size_bytes updated
          - exported_at timestamp set" \
            --label "model-update"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
