name: Model Release

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Force re-release even if already published'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      hf_sha: ${{ steps.detect.outputs.hf_sha }}
      model_tag: ${{ steps.detect.outputs.model_tag }}
      should_release: ${{ steps.detect.outputs.should_release }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Detect if new HuggingFace revision
        id: detect
        run: |
          SHA=$(python3 -c "
          import requests, json
          r = requests.get('https://huggingface.co/api/models/nomic-ai/nomic-embed-text-v1.5', timeout=10)
          print(json.loads(r.text)['sha'][:12])
          ")

          MODEL_TAG="embed-code-v1.5"
          echo "hf_sha=${SHA}" >> $GITHUB_OUTPUT
          echo "model_tag=${MODEL_TAG}" >> $GITHUB_OUTPUT

          # Compare against committed descriptor
          STORED=$(python3 -c "
          import json
          try:
            with open('models/model-descriptor.json') as f:
              d = json.load(f)
            print(d.get('model',{}).get('hf_revision','')[:12])
          except: print('')
          ")

          if [ "${{ inputs.force }}" = "true" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "Force release requested"
          elif [ "$SHA" = "$STORED" ]; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "HF revision unchanged (${SHA}) — skipping"
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "New HF revision: ${SHA} (was: ${STORED})"
          fi

  export:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install export dependencies
        run: pip install transformers torch onnx onnxscript onnxruntime einops optimum

      - name: Export ONNX model (float32 → int8 quantized)
        run: |
          python3 scripts/export-model.py \
            --model nomic-ai/nomic-embed-text-v1.5 \
            --output models/nomic-embed-code-v1.5.int8.onnx
        timeout-minutes: 15

      - name: Package model assets
        id: package
        run: |
          cd models
          zip "embed-code-int8-v1.5.zip" \
            nomic-embed-code-v1.5.int8.onnx \
            model-descriptor.json \
            tokenizer.json
          SHA256=$(sha256sum "embed-code-int8-v1.5.zip" | cut -d' ' -f1)
          SIZE=$(stat -c%s "embed-code-int8-v1.5.zip")
          echo "zip_sha256=${SHA256}" >> $GITHUB_OUTPUT
          echo "zip_size=${SIZE}" >> $GITHUB_OUTPUT
          echo "Packaged: embed-code-int8-v1.5.zip (${SIZE} bytes, SHA256: ${SHA256})"

      - uses: actions/upload-artifact@v7
        with:
          name: model-zip
          path: models/embed-code-int8-v1.5.zip
          retention-days: 1

  validate:
    needs: export
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Download & extract model
        uses: actions/download-artifact@v4
        with:
          name: model-zip
          path: models/
      - run: |
          cd models
          unzip -o embed-code-int8-v1.5.zip
          ls -lh nomic-embed-code-v1.5.int8.onnx

      - run: npm ci
      - run: npm run build

      - name: Run integration tests
        run: npm run test:coverage
        env:
          EMBED_CODE_MODEL_PATH: models/nomic-embed-code-v1.5.int8.onnx

      - name: Coverage threshold check
        run: node scripts/ci-coverage-check.js --tier release --verbose

      - name: Run benchmark
        run: |
          npx tsx scripts/benchmark-ci.js \
            --verbose --json benchmark-report.json --md benchmark-report.md --html benchmark-report.html
        env:
          EMBED_CODE_MODEL_PATH: models/nomic-embed-code-v1.5.int8.onnx
          BENCH_ITERATIONS: 10

      - name: Accuracy gate
        run: node scripts/ci-benchmark-check.js --verbose

  release:
    needs: [check, validate]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v4
        with:
          name: model-zip
          path: release-assets/

      - name: Create GitHub Release
        run: |
          MODEL_TAG="${{ needs.check.outputs.model_tag }}"
          SHA="${{ needs.check.outputs.hf_sha }}"

          # Versioned release: embed-code-v1.5-<hf_revision>
          RELEASE_TAG="${MODEL_TAG}-${SHA}"
          gh release create "${RELEASE_TAG}" \
            release-assets/embed-code-int8-v1.5.zip \
            --title "Embed Code v1.5 int8 ONNX Model (rev ${SHA})" \
            --notes "Pre-exported nomic-embed-code-v1.5 int8-quantized ONNX model.

          **HF revision:** \`${SHA}\`
          **Precision:** int8 (dynamic quantization)
          **Architecture:** BERT-base, 12 layers, dim=768

          ### Asset
          - \`embed-code-int8-v1.5.zip\` — Contains:
            - \`nomic-embed-code-v1.5.int8.onnx\` — int8-quantized model (~137 MB)
            - \`model-descriptor.json\` — architecture and input/output metadata
            - \`tokenizer.json\` — WordPiece vocabulary (40,856 tokens)

          ### Usage
          \`\`\`bash
          npx @agentix-e/embed-code-cli setup
          \`\`\`"

          # Update rolling latest pointer
          if gh release view embed-code-latest &>/dev/null; then
            gh release upload embed-code-latest \
              release-assets/embed-code-int8-v1.5.zip --clobber
            gh api \
              --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "/repos/${GITHUB_REPOSITORY}/releases/tags/embed-code-latest" \
              -f tag_name='embed-code-latest' \
              -f name='Embed Code ONNX — Latest' \
              -f body="Rolling pointer to the latest validated nomic-embed-code int8 ONNX model.

          **Current HF revision:** \`${SHA}\`
          **Model tag:** \`${RELEASE_TAG}\`

          This release is automatically updated when a new model version is detected." \
              -f prerelease=false
          else
            gh release create embed-code-latest \
              release-assets/embed-code-int8-v1.5.zip \
              --title "Embed Code ONNX — Latest" \
              --notes "Rolling pointer to the latest validated nomic-embed-code int8 ONNX model.

          **Current HF revision:** \`${SHA}\`
          **Model tag:** \`${RELEASE_TAG}\`

          This release is automatically updated when a new model version is detected." \
              --latest=false
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  commit-descriptor:
    needs: [release]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - name: Update model-descriptor.json and create PR
        run: |
          SHA="${{ needs.check.outputs.hf_sha }}"
          BRANCH_NAME="auto/model-descriptor-update-${SHA}"

          # Update descriptor with validated hash
          EXPORTED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          python3 -c "
          import json
          with open('models/model-descriptor.json') as f:
              d = json.load(f)
          d['model']['hf_revision'] = '${SHA}'
          d['model']['exported_at'] = '${EXPORTED_AT}'
          with open('models/model-descriptor.json', 'w') as f:
              json.dump(d, f, indent=2)
              f.write('\n')
          "

          if git diff --quiet models/model-descriptor.json; then
            echo "No changes to model-descriptor.json — skipping"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH_NAME}"
          git add models/model-descriptor.json
          git commit -m "chore(model): update descriptor (HF rev ${SHA})

          Auto-generated by model-release workflow.
          New HF revision detected: ${SHA}"

          git push origin "${BRANCH_NAME}"

          gh pr create \
            --title "chore(model): update model descriptor (HF rev ${SHA})" \
            --body "Automated PR created by model-release workflow.

          **HF revision:** \`${SHA}\`

          This PR updates \`models/model-descriptor.json\` with the latest HuggingFace revision after successful validation." \
            --label "model-update" \
            --base master \
            --head "${BRANCH_NAME}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
