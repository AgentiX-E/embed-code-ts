name: Model Release

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'HuggingFace model ID'
        required: true
        default: 'nomic-ai/nomic-embed-code'
      precision:
        description: 'Export precision'
        required: true
        default: 'int8'
        type: choice
        options:
          - int8
          - fp32
          - fp16

jobs:
  export-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install optimum onnx onnxruntime torch transformers huggingface_hub

      - name: Export ONNX model
        run: |
          python3 scripts/export-onnx.py \
            --output models/nomic-embed-code-v1-${{ inputs.precision }}.onnx \
            --model ${{ inputs.model }} \
            --precision ${{ inputs.precision }}

      - name: Package model
        run: |
          cd models
          zip nomic-embed-code-v1-${{ inputs.precision }}.zip \
            nomic-embed-code-v1-${{ inputs.precision }}.onnx \
            model-descriptor.json \
            tokenizer.json \
            tokenizer_config.json \
            vocab.json \
            merges.txt \
            special_tokens_map.json \
            added_tokens.json 2>/dev/null || true
          ls -lh nomic-embed-code-v1-${{ inputs.precision }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: embed-code-latest-${{ inputs.precision }}
          name: 'nomic-embed-code v1 (${{ inputs.precision }})'
          body: |
            Pre-exported nomic-embed-code v1 ONNX model (${{ inputs.precision }} precision).

            See [model-descriptor.json](./models/model-descriptor.json) for architecture details.
          files: |
            models/nomic-embed-code-v1-${{ inputs.precision }}.zip
            models/model-descriptor.json
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
