name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip full test suite (for hotfix releases)'
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Stage 1 — Quality Gates
  # ═══════════════════════════════════════════════════════════════════════════
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npm run build:all

      - name: Lint & Format
        run: |
          npm run lint
          npm run format:check

      - name: Unit Tests with coverage
        run: npm run test:unit:coverage

      - name: Check unit coverage thresholds
        run: node scripts/ci-coverage-check.js --tier unit --verbose

      - name: Setup Python
        if: ${{ !inputs.skip_tests }}
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache ONNX model (restore)
        if: ${{ !inputs.skip_tests }}
        id: cache-model
        uses: actions/cache@v6
        with:
          path: models/nomic-embed-text-v1.5-int8.onnx
          key: embed-code-model-${{ hashFiles('models/model-descriptor.json') }}-v3

      - name: Download pre-converted ONNX model
        if: ${{ !inputs.skip_tests && steps.cache-model.outputs.cache-hit != 'true' }}
        run: |
          pip install huggingface_hub
          python3 -c "
          from huggingface_hub import hf_hub_download
          path = hf_hub_download('nomic-ai/nomic-embed-text-v1.5', 'onnx/model_int8.onnx')
          import shutil, os
          os.makedirs('models', exist_ok=True)
          shutil.copy(path, 'models/nomic-embed-text-v1.5-int8.onnx')
          " || true
        timeout-minutes: 5

      - name: Run integration tests with coverage
        if: ${{ !inputs.skip_tests }}
        run: npx vitest run --coverage
        env:
          EMBED_CODE_MODEL_PATH: models/nomic-embed-text-v1.5-int8.onnx

      - name: Check integration coverage thresholds
        if: ${{ !inputs.skip_tests }}
        run: node scripts/ci-coverage-check.js --tier integration --verbose

      - name: Ensure coverage directory exists
        if: ${{ !inputs.skip_tests }}
        run: |
          mkdir -p coverage
          if [ ! -f coverage/coverage-summary.json ]; then
            echo '{"total":{"lines":{"pct":0},"branches":{"pct":0},"functions":{"pct":0},"statements":{"pct":0}}}' > coverage/coverage-summary.json
          fi
        continue-on-error: true

      - name: Upload coverage
        if: ${{ !inputs.skip_tests }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # Stage 2 — Benchmark — reuses cached model
  # ═══════════════════════════════════════════════════════════════════════════
  benchmark:
    needs: quality
    if: ${{ !inputs.skip_tests }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build:all

      - name: Restore cached ONNX model
        uses: actions/cache/restore@v6
        with:
          path: models/nomic-embed-text-v1.5-int8.onnx
          key: embed-code-model-${{ hashFiles('models/model-descriptor.json') }}-v3
          fail-on-cache-miss: true

      - name: Run benchmark
        run: |
          node scripts/benchmark-ci.js \
            --json benchmark-report.json \
            --md benchmark-report.md \
            --html benchmark-report.html \
            --baseline benchmarks/baseline.json \
            --verbose
        timeout-minutes: 10
        env:
          EMBED_CODE_MODEL_PATH: models/nomic-embed-text-v1.5-int8.onnx
          BENCH_ITERATIONS: 10

      - name: Accuracy Gate
        run: node scripts/ci-benchmark-check.js --verbose

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-report
          path: |
            benchmark-report.json
            benchmark-report.md
            benchmark-report.html
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # Stage 3 — Publish npm Packages (OIDC)
  # ═══════════════════════════════════════════════════════════════════════════
  publish-npm:
    needs: [quality, benchmark]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - run: npm ci
      - run: npm run build:all

      - name: Publish to npm (OIDC)
        run: |
          for pkg in embed-code-core embed-code-cli; do
            cd "packages/${pkg}"
            npm publish --access public --provenance
            cd ../..
          done

      - name: npm publish summary
        run: |
          echo "### npm Packages Published" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Version |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|" >> $GITHUB_STEP_SUMMARY
          for pkg in packages/embed-code-core packages/embed-code-cli; do
            name=$(node -p "require('./${pkg}/package.json').name")
            version=$(node -p "require('./${pkg}/package.json').version")
            echo "| \`${name}\` | ${version} |" >> $GITHUB_STEP_SUMMARY
          done

  # ═══════════════════════════════════════════════════════════════════════════
  # Stage 4 — Deploy Documentation to GitHub Pages
  # ═══════════════════════════════════════════════════════════════════════════
  deploy-pages:
    needs: [quality, benchmark, publish-npm]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npm run build:all

      - name: Generate API documentation
        run: npx typedoc

      - name: Download benchmark report
        uses: actions/download-artifact@v4
        with:
          name: benchmark-report
          path: docs/benchmark
        continue-on-error: true

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: docs/coverage
        continue-on-error: true

      - name: Prepare pages
        run: node scripts/prepare-pages.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
