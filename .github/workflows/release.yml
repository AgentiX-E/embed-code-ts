name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip full test suite (for hotfix releases)'
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Stage 1 — Quality Gates
  # ═══════════════════════════════════════════════════════════════════════════
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npm run build:all

      - name: Lint & Format
        run: |
          npm run lint
          npm run format:check

      - name: Unit Tests with coverage
        run: npm run test:unit:coverage

      - name: Check unit coverage thresholds
        run: node scripts/ci-coverage-check.js --tier unit --verbose

      - name: Setup Python
        if: ${{ !inputs.skip_tests }}
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache ONNX model
        if: ${{ !inputs.skip_tests }}
        id: cache-model
        uses: actions/cache@v6
        with:
          path: models/nomic-embed-code-v1-int8.onnx
          key: embed-code-model-${{ hashFiles('scripts/export-onnx.py', 'models/model-descriptor.json') }}-v1

      - name: Download ONNX model from GitHub Release
        if: ${{ !inputs.skip_tests && steps.cache-model.outputs.cache-hit != 'true' }}
        run: |
          mkdir -p models
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/embed-code-latest-int8/nomic-embed-code-v1-int8.zip"
          if curl -sfL -o models/nomic-embed-code-v1-int8.zip "$RELEASE_URL"; then
            unzip -o models/nomic-embed-code-v1-int8.zip -d models/
            echo "Downloaded nomic-embed-code 7B int8 from GitHub Release"
          else
            echo "GitHub Release not available — downloading nomic-embed-text-v1.5 as fallback"
            pip install huggingface_hub
            python3 -c "
          from huggingface_hub import hf_hub_download
          import shutil
          path = hf_hub_download('nomic-ai/nomic-embed-text-v1.5', 'onnx/model_int8.onnx')
          shutil.copy(path, 'models/nomic-embed-text-v1.5-int8.onnx')
          print(f'Downloaded: {__import__(\"os\").path.getsize(\"models/nomic-embed-text-v1.5-int8.onnx\") / 1024**2:.0f} MB')
          "
            # Also download tokenizer files
            for repo in nomic-ai/nomic-embed-text-v1.5 nomic-ai/nomic-embed-code; do
              python3 -c "
          from huggingface_hub import hf_hub_download
          import shutil
          for f in ['tokenizer.json', 'tokenizer_config.json']:
              try:
                  path = hf_hub_download('$repo', f)
                  shutil.copy(path, f'models/{f}')
              except: pass
          " || true
            done
          fi
        timeout-minutes: 15

      - name: Determine model path for tests
        if: ${{ !inputs.skip_tests }}
        id: model-path
        run: |
          if [ -f models/nomic-embed-code-v1-int8.onnx ]; then
            echo "path=models/nomic-embed-code-v1-int8.onnx" >> $GITHUB_OUTPUT
          elif [ -f models/nomic-embed-text-v1.5-int8.onnx ]; then
            echo "path=models/nomic-embed-text-v1.5-int8.onnx" >> $GITHUB_OUTPUT
          else
            echo "path=" >> $GITHUB_OUTPUT
          fi

      - name: Run integration tests with coverage
        if: ${{ !inputs.skip_tests && steps.model-path.outputs.path != '' }}
        run: npx vitest run --coverage
        env:
          EMBED_CODE_MODEL_PATH: ${{ steps.model-path.outputs.path }}

      - name: Check integration coverage thresholds
        if: ${{ !inputs.skip_tests && steps.model-path.outputs.path != '' }}
        run: node scripts/ci-coverage-check.js --tier integration --verbose

      - name: Ensure coverage directory exists
        if: ${{ !inputs.skip_tests }}
        run: |
          mkdir -p coverage
          if [ ! -f coverage/coverage-summary.json ]; then
            echo '{"total":{"lines":{"pct":0},"branches":{"pct":0},"functions":{"pct":0},"statements":{"pct":0}}}' > coverage/coverage-summary.json
          fi
        continue-on-error: true

      - name: Upload coverage
        if: ${{ !inputs.skip_tests }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # Stage 2 — Benchmark
  # ═══════════════════════════════════════════════════════════════════════════
  benchmark:
    needs: quality
    if: ${{ !inputs.skip_tests }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build:all

      - name: Restore cached ONNX model
        uses: actions/cache/restore@v6
        with:
          path: models/nomic-embed-code-v1-int8.onnx
          key: embed-code-model-${{ hashFiles('scripts/export-onnx.py', 'models/model-descriptor.json') }}-v1
          fail-on-cache-miss: true

      - name: Run benchmark
        run: |
          node scripts/benchmark-ci.js \
            --json benchmark-report.json \
            --md benchmark-report.md \
            --html benchmark-report.html \
            --baseline benchmarks/baseline.json \
            --verbose
        timeout-minutes: 10
        env:
          EMBED_CODE_MODEL_PATH: models/nomic-embed-code-v1-int8.onnx
          BENCH_ITERATIONS: 10

      - name: Accuracy Gate
        run: node scripts/ci-benchmark-check.js --verbose

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-report
          path: |
            benchmark-report.json
            benchmark-report.md
            benchmark-report.html
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # Stage 3 — Publish npm Packages (OIDC)
  # ═══════════════════════════════════════════════════════════════════════════
  publish-npm:
    needs: [quality, benchmark]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - run: npm ci
      - run: npm run build:all

      - name: Publish to npm (OIDC)
        run: |
          for pkg in embed-code-core embed-code-cli; do
            cd "packages/${pkg}"
            npm publish --access public --provenance
            cd ../..
          done

      - name: npm publish summary
        run: |
          echo "### npm Packages Published" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Version |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|" >> $GITHUB_STEP_SUMMARY
          for pkg in packages/embed-code-core packages/embed-code-cli; do
            name=$(node -p "require('./${pkg}/package.json').name")
            version=$(node -p "require('./${pkg}/package.json').version")
            echo "| \`${name}\` | ${version} |" >> $GITHUB_STEP_SUMMARY
          done

  # ═══════════════════════════════════════════════════════════════════════════
  # Stage 4 — Deploy Documentation to GitHub Pages
  # ═══════════════════════════════════════════════════════════════════════════
  deploy-pages:
    needs: [quality, benchmark, publish-npm]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npm run build:all

      - name: Generate API documentation
        run: npx typedoc

      - name: Download benchmark report
        uses: actions/download-artifact@v8
        with:
          name: benchmark-report
          path: docs/benchmark
        continue-on-error: true

      - name: Download coverage report
        uses: actions/download-artifact@v8
        with:
          name: coverage-report
          path: docs/coverage
        continue-on-error: true

      - name: Prepare pages
        run: node scripts/prepare-pages.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
